---
- name: Rolling restart Solr nodes (ZK-aware)
  hosts: solr_nodes
  become: true
  serial: 1
  vars:
    solr_port: 8983
    solr_bin: "/opt/solr/bin/solr"
    max_wait_sec: 300

  pre_tasks:
    - name: Check ZooKeeper quorum
      uri:
        url: "http://{{ hostvars[groups['zookeeper'][0]].ansible_host }}:8080/commands/ruok"
        return_content: true
      register: zk_check
      delegate_to: "{{ groups['zookeeper'][0]}}"
      run_once: true
      failed_when: zk_check.content != "imok"

    - name: Drain Solr node from load balancer
      uri:
        url: "http://localhost:{{ solr_port }}/solr/admin/collections?action=REQUESTAPPLICATIONSTATE&state=down"
        status_code: [200, 404]
      ignore_errors: true

  roles:
    - role: solr_rolling
      vars:
        action: restart

  post_tasks:
    - name: Wait for Solr to be ready
      uri:
        url: "http://localhost:{{ solr_port }}/solr/admin/ping?wt=json"
        status_code: 200
      register: ping
      until: ping.status == 200
      retries: 60
      delay: 5

    - name: Re-enable node in load balancer
      uri:
        url: "http://localhost:{{ solr_port }}/solr/admin/collections?action=REQUESTAPPLICATIONSTATE&state=active"
        status_code: [200, 404]
      ignore_errors: true
